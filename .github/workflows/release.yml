name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && 'beta' || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-package:
    name: Package ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep the Linux x64 VSIX compatible with Ubuntu 22.04 glibc/libstdc++.
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: macos-15
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Set build metadata
        shell: bash
        run: |
          echo "VIZSLA_COMMIT_HASH=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
          echo "VIZSLA_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"

      - name: Build VSIX
        working-directory: editors/vscode
        run: npm run package:${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vizsla-vscode-${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }}-${{ matrix.target }}
          path: editors/vscode/vizsla-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error

  build-alpine-package:
    name: Package ${{ matrix.target }}
    runs-on: ubuntu-22.04
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: alpine-x64
            image: ghcr.io/blackdex/rust-musl:x86_64-musl-nightly
          - target: alpine-arm64
            image: ghcr.io/blackdex/rust-musl:aarch64-musl-nightly
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates cmake git python3

      - name: Install Rust components
        run: rustup component add --toolchain nightly-x86_64-unknown-linux-gnu rustfmt

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Trust checkout directories
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/crates/slang"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Set build metadata
        shell: bash
        run: |
          echo "VIZSLA_COMMIT_HASH=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
          echo "VIZSLA_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"

      - name: Build VSIX
        working-directory: editors/vscode
        run: npm run package:${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vizsla-vscode-${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }}-${{ matrix.target }}
          path: editors/vscode/vizsla-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error

  publish:
    name: Publish ${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }} release
    needs: [build-and-package, build-alpine-package]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && 'beta' || github.ref_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && 'Vizsla beta' || format('Vizsla {0}', github.ref_name) }}
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' }}
      RELEASE_MAKE_LATEST: ${{ github.event_name == 'workflow_dispatch' && 'false' || 'true' }}
    steps:
      - name: Checkout release ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Move beta tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f beta "$GITHUB_SHA"
          git push -f origin beta

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          make_latest: ${{ env.RELEASE_MAKE_LATEST }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: artifacts/**/*.vsix

  publish-marketplace:
    name: Publish VS Code Marketplace
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-package, publish]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish VSIX packages
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VSCE_PAT:-}" ]]; then
            echo "VSCE_PAT secret is not set; cannot publish to VS Code Marketplace." >&2
            exit 1
          fi

          shopt -s globstar nullglob
          vsixes=(../../artifacts/**/*.vsix)
          if (( ${#vsixes[@]} == 0 )); then
            echo "No VSIX artifacts found to publish." >&2
            exit 1
          fi

          for vsix in "${vsixes[@]}"; do
            node node_modules/@vscode/vsce/vsce publish --packagePath "$vsix"
          done
