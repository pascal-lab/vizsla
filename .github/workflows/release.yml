name: Release

on:
  push:
    tags:
      - "v*"
      - "nightly"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package and publish, for example v0.1.0 or nightly"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-package:
    name: Package ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: macos-14
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Build VSIX
        working-directory: editors/vscode
        run: npm run package:${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vizsla-vscode-${{ matrix.target }}
          path: editors/vscode/vizsla-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-and-package]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_PRERELEASE: ${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease) || github.ref_name == 'nightly' }}
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*.vsix
