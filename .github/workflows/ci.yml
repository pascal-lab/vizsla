name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["**"]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  EMSDK_VERSION: 5.0.2

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      plan: ${{ steps.plan.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v4
        with:
          filters: .github/ci-modules.yml
      - name: Plan CI jobs
        id: plan
        uses: actions/github-script@v9
        env:
          FILTER_RUST: ${{ steps.filter.outputs.rust }}
          FILTER_VSCODE: ${{ steps.filter.outputs.vscode }}
          FILTER_PACKAGE: ${{ steps.filter.outputs.package }}
        with:
          retries: 3
          result-encoding: string
          script: |
            const { pathToFileURL } = await import('node:url');
            const scriptUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/.github/scripts/ci-plan.mjs`);
            const { planCi } = await import(scriptUrl.href);
            const plan = await planCi({
              github,
              context,
              core,
              filters: {
                rust: process.env.FILTER_RUST === 'true',
                vscode: process.env.FILTER_VSCODE === 'true',
                package: process.env.FILTER_PACKAGE === 'true',
              },
            });
            return JSON.stringify(plan);

  rust-lint:
    name: Rust Linting
    needs: changes
    if: fromJSON(needs.changes.outputs.plan).run_rust_lint == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
      - name: Setup sccache
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: rust-${{ runner.os }}
          key: workspace-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'xtask/**') }}
          cache-workspace-crates: true
          cache-on-failure: true
      - name: Format Check
        run: cargo fmt --all -- --check
      - name: Config Artifact Check
        run: cargo xtask check-config-artifacts
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust Tests (${{ matrix.os }})
    needs: changes
    if: fromJSON(needs.changes.outputs.plan).run_rust_test == true
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.plan).rust_test_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: Setup sccache
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: rust-${{ runner.os }}
          key: workspace-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'xtask/**') }}
          cache-workspace-crates: true
          cache-on-failure: true
      - name: Test
        run: cargo test --workspace

  vscode-extension:
    name: VS Code Checks
    needs: changes
    if: fromJSON(needs.changes.outputs.plan).run_vscode_extension == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test extension
        run: npm test

  vscode-web-smoke:
    name: VS Code Web Smoke
    needs: changes
    if: fromJSON(needs.changes.outputs.plan).run_vscode_web_smoke == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - name: Restore playground WASM cache
        id: playground-wasm-cache
        uses: actions/cache/restore@v4
        with:
          path: playground/public/wasm
          key: playground-wasm-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'playground/scripts/build-vide-wasm.mjs', 'playground/scripts/script-utils.mjs', '.github/actions/setup-emscripten/**', '.github/actions/setup-rust/**') }}
      - name: Verify cached playground WASM
        if: steps.playground-wasm-cache.outputs.cache-hit == 'true'
        working-directory: .
        run: |
          test -s playground/public/wasm/vide-lsp.js
          test -s playground/public/wasm/vide-core.js
          test -s playground/public/wasm/vide-core.wasm
      - name: Install Rust
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: Setup sccache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"
      - name: Rust Cache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: vscode-web-wasm-${{ runner.os }}-${{ env.EMSDK_VERSION }}
          key: wasm-src-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'playground/scripts/build-vide-wasm.mjs', 'playground/scripts/script-utils.mjs', '.github/actions/setup-emscripten/**', '.github/actions/setup-rust/**') }}
          cache-workspace-crates: true
          cache-on-failure: true
      - name: Install Emscripten SDK
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-emscripten
        with:
          version: ${{ env.EMSDK_VERSION }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build playground WASM
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        working-directory: playground
        run: |
          source "${EMSDK}/emsdk_env.sh"
          npm run build:wasm
      - name: Save playground WASM cache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: playground/public/wasm
          key: ${{ steps.playground-wasm-cache.outputs.cache-primary-key }}
      - name: Web smoke test
        run: npm run test:web

  dev-package:
    name: Dev Package (${{ matrix.target }})
    needs: changes
    if: fromJSON(needs.changes.outputs.plan).run_dev_package == true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.plan).dev_package_matrix }}
    defaults:
      run:
        working-directory: editors/vscode
    env:
      SERVER_BIN: ${{ startsWith(matrix.target, 'win32-') && 'vide.exe' || 'vide' }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore bundled server cache
        id: bundled-server-cache
        uses: actions/cache/restore@v4
        with:
          path: editors/vscode/server/${{ matrix.target }}/${{ env.SERVER_BIN }}
          key: bundled-server-${{ matrix.target }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**') }}
      - name: Install Rust
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: Setup sccache
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"
      - name: Rust Cache
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: rust-${{ runner.os }}
          key: package-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**') }}
          cache-workspace-crates: true
          cache-on-failure: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Set build metadata
        id: build-metadata
        shell: bash
        run: |
          commit_hash="$(git rev-parse --short "$GITHUB_SHA")"
          echo "commit_hash=${commit_hash}" >> "$GITHUB_OUTPUT"
          echo "VIDE_EXTENSION_BUILD_KIND=nightly" >> "$GITHUB_ENV"
          echo "VIDE_EXTENSION_COMMIT_HASH=${commit_hash}" >> "$GITHUB_ENV"
          echo "VIDE_EXTENSION_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"
      - name: Package extension
        run: npm run package:debug -- ${{ matrix.target }} ${{ steps.bundled-server-cache.outputs.cache-hit == 'true' && '--server=prebuilt' || '--server=build' }}
      - name: Save bundled server cache
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: editors/vscode/server/${{ matrix.target }}/${{ env.SERVER_BIN }}
          key: ${{ steps.bundled-server-cache.outputs.cache-primary-key }}
      - name: Upload dev VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vide-vscode-dev-${{ matrix.target }}-${{ steps.build-metadata.outputs.commit_hash }}
          path: editors/vscode/vide-vscode-${{ matrix.target }}-debug.vsix
          if-no-files-found: error
          retention-days: 14
      - name: Upload dev language server binary
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          server_dir="editors/vscode/server/${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == win32-* ]]; then
            src="${server_dir}/vide.exe"
            dst="vide-${{ matrix.target }}.exe"
          else
            src="${server_dir}/vide"
            dst="vide-${{ matrix.target }}"
          fi
          if [[ ! -f "$src" ]]; then
            echo "Language server binary not found: $src" >&2
            exit 1
          fi
          cp "$src" "$dst"
      - name: Upload dev language server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vide-lsp-dev-${{ matrix.target }}-${{ steps.build-metadata.outputs.commit_hash }}
          path: vide-${{ matrix.target }}*
          if-no-files-found: error
          retention-days: 14

  dev-web-package:
    name: Dev Package (web)
    needs: changes
    if: fromJSON(needs.changes.outputs.plan).run_dev_web_package == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - name: Restore playground WASM cache
        id: playground-wasm-cache
        uses: actions/cache/restore@v4
        with:
          path: playground/public/wasm
          key: playground-wasm-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'playground/scripts/build-vide-wasm.mjs', 'playground/scripts/script-utils.mjs', '.github/actions/setup-emscripten/**', '.github/actions/setup-rust/**') }}
      - name: Verify cached playground WASM
        if: steps.playground-wasm-cache.outputs.cache-hit == 'true'
        working-directory: .
        run: |
          test -s playground/public/wasm/vide-lsp.js
          test -s playground/public/wasm/vide-core.js
          test -s playground/public/wasm/vide-core.wasm
      - name: Install Rust
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: Setup sccache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"
      - name: Rust Cache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: vscode-web-wasm-${{ runner.os }}-${{ env.EMSDK_VERSION }}
          key: wasm-src-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'playground/scripts/build-vide-wasm.mjs', 'playground/scripts/script-utils.mjs', '.github/actions/setup-emscripten/**', '.github/actions/setup-rust/**') }}
          cache-workspace-crates: true
          cache-on-failure: true
      - name: Install Emscripten SDK
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-emscripten
        with:
          version: ${{ env.EMSDK_VERSION }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build playground WASM
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        working-directory: playground
        run: |
          source "${EMSDK}/emsdk_env.sh"
          npm run build:wasm
      - name: Save playground WASM cache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: playground/public/wasm
          key: ${{ steps.playground-wasm-cache.outputs.cache-primary-key }}
      - name: Set build metadata
        id: build-metadata
        shell: bash
        working-directory: .
        run: |
          commit_hash="$(git rev-parse --short "$GITHUB_SHA")"
          echo "commit_hash=${commit_hash}" >> "$GITHUB_OUTPUT"
          echo "VIDE_EXTENSION_BUILD_KIND=nightly" >> "$GITHUB_ENV"
          echo "VIDE_EXTENSION_COMMIT_HASH=${commit_hash}" >> "$GITHUB_ENV"
          echo "VIDE_EXTENSION_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"
      - name: Package extension
        run: npm run package:web
      - name: Upload dev VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vide-vscode-dev-web-${{ steps.build-metadata.outputs.commit_hash }}
          path: editors/vscode/vide-vscode-web.vsix
          if-no-files-found: error
          retention-days: 14

  dev-alpine-package:
    name: Dev Package (${{ matrix.target }})
    needs: changes
    if: fromJSON(needs.changes.outputs.plan).run_dev_alpine_package == true
    runs-on: ubuntu-22.04
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.plan).dev_alpine_matrix }}
    defaults:
      run:
        working-directory: editors/vscode
    env:
      SERVER_BIN: ${{ startsWith(matrix.target, 'win32-') && 'vide.exe' || 'vide' }}
    steps:
      - name: Install build dependencies
        working-directory: .
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates cmake git python3

      - uses: actions/checkout@v4

      - name: Trust checkout directories
        working-directory: .
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore bundled server cache
        id: bundled-server-cache
        uses: actions/cache/restore@v4
        with:
          path: editors/vscode/server/${{ matrix.target }}/${{ env.SERVER_BIN }}
          key: bundled-server-${{ matrix.target }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**') }}

      - name: Install Rust
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          targets: ${{ matrix.rust-target }}

      - name: Setup sccache
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"

      - name: Rust Cache
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: rust-${{ runner.os }}-${{ matrix.target }}
          key: package-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**') }}
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set build metadata
        id: build-metadata
        shell: bash
        working-directory: .
        run: |
          commit_hash="$(git rev-parse --short "$GITHUB_SHA")"
          echo "commit_hash=${commit_hash}" >> "$GITHUB_OUTPUT"
          echo "VIDE_EXTENSION_BUILD_KIND=nightly" >> "$GITHUB_ENV"
          echo "VIDE_EXTENSION_COMMIT_HASH=${commit_hash}" >> "$GITHUB_ENV"
          echo "VIDE_EXTENSION_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"

      - name: Package extension
        run: npm run package:debug -- ${{ matrix.target }} ${{ steps.bundled-server-cache.outputs.cache-hit == 'true' && '--server=prebuilt' || '--server=build' }}

      - name: Save bundled server cache
        if: steps.bundled-server-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: editors/vscode/server/${{ matrix.target }}/${{ env.SERVER_BIN }}
          key: ${{ steps.bundled-server-cache.outputs.cache-primary-key }}

      - name: Upload dev VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vide-vscode-dev-${{ matrix.target }}-${{ steps.build-metadata.outputs.commit_hash }}
          path: editors/vscode/vide-vscode-${{ matrix.target }}-debug.vsix
          if-no-files-found: error
          retention-days: 14
      - name: Upload dev language server binary
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          server_dir="editors/vscode/server/${{ matrix.target }}"
          src="${server_dir}/vide"
          dst="vide-${{ matrix.target }}"
          if [[ ! -f "$src" ]]; then
            echo "Language server binary not found: $src" >&2
            exit 1
          fi
          cp "$src" "$dst"
      - name: Upload dev language server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vide-lsp-dev-${{ matrix.target }}-${{ steps.build-metadata.outputs.commit_hash }}
          path: vide-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 14
