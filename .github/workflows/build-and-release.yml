name: Build and Release Vizsla VSCode Extension

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 构建 LSP 服务器
  build-lsp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary_name: vizsla
            artifact_name: vizsla-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            binary_name: vizsla
            artifact_name: vizsla-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            binary_name: vizsla.exe
            artifact_name: vizsla-win32-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build LSP server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Upload LSP binary
        uses: actions/upload-artifact@v4
        with:
          name: lsp-${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}

  # 构建和打包 VSCode 扩展
  build-extension:
    needs: build-lsp
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary_name: vizsla
            artifact_name: vizsla-linux-x64
          - os: macos-latest
            platform: darwin-arm64
            binary_name: vizsla
            artifact_name: vizsla-darwin-arm64
          - os: windows-latest
            platform: win32-x64
            binary_name: vizsla.exe
            artifact_name: vizsla-win32-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download LSP binary
        uses: actions/download-artifact@v4
        with:
          name: lsp-${{ matrix.artifact_name }}
          path: lsp-binary/

      - name: Create server directory
        run: |
          mkdir -p editors/vscode/server/${{ matrix.platform }}

      - name: Copy LSP server binary
        run: |
          cp lsp-binary/${{ matrix.binary_name }} editors/vscode/server/${{ matrix.platform }}/

      - name: Make binary executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x editors/vscode/server/${{ matrix.platform }}/${{ matrix.binary_name }}

      - name: Install extension dependencies
        run: |
          cd editors/vscode
          npm install

      - name: Package extension
        run: |
          cd editors/vscode          
          npx vsce package --target ${{ matrix.platform }} --out vizsla-vscode-${{ matrix.platform }}.vsix

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vizsla-vscode-${{ matrix.platform }}
          path: editors/vscode/vizsla-vscode-${{ matrix.platform }}.vsix

  # 发布到 GitHub Releases
  release:
    if: github.event_name == 'release'
    needs: [build-lsp, build-extension]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Upload LSP binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/lsp-*/vizsla*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSCode extensions to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vizsla-vscode-*/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

