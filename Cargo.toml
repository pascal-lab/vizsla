[package]
name = "vizsla"
version = "0.1.0"
edition = "2021"
authors = ["roifewu <roifewu@gmail.com>"]
repository = "https://github.com/roife/vizsla"
keywords = ["lsp", "language-server", "ide", "verilog", "system-verilog"]
categories = ["development-tools"]
license = "MIT"
readme = "README.md"
description = "Language server for Verilog and System-Verilog"

[workspace]
members = [".", "crates/*"]

[workspace.package]
edition = "2021"

[dependencies]
anyhow = "1.0.75"
clap = { version = "4.4.6", features = ["derive"] }
const_format = "0.2.31"
nohash-hasher = "0.2.0"
lsp-server = { version = "0.7.4" }
lsp-types = "0.94.1"
tracing = "0.1.37"
tracing-subscriber = { version = "0.3.17", default-features = false, features = ["registry", "fmt", "tracing-log",] }
utils.workspace = true
vfs.workspace = true
ide.workspace = true
project-model.workspace = true
vfs-notify.workspace = true
hir.workspace = true
base-db.workspace = true
serde_json = "1.0.107"
serde = { version = "1.0.189", features = ["derive"] }
itertools = "0.11.0"
crossbeam-channel = "0.5.8"
num_cpus = "1.16.0"
rustc-hash = "1.1.0"
notify = "6.1.1"
always-assert = "0.1.3"
parking_lot = "0.12.1"
triomphe = "0.1.9"
la-arena = "0.3.1"
smol_str = { version = "0.2.0", features = ["serde"] }
either = "1.9.0"
toml = "0.8.8"
regex = "1.10.2"
once_cell = "1.18.0"
salsa = "0.17.0-pre.2"


[workspace.dependencies]
vfs = { path = "./crates/vfs", version = "0.0.0" }
utils = { path = "./crates/utils", version = "0.0.0" }
ide = { path = "./crates/ide/", version = "0.0.0" }
vfs-notify = { path = "./crates/vfs-notify/", version = "0.0.0" }
hir = { path = "./crates/hir/", version = "0.0.0" }
base-db = { path = "./crates/base-db/", version = "0.0.0" }
ide-db = { path = "./crates/ide-db/", version = "0.0.0" }
project-model = { path = "./crates/project-model/", version = "0.0.0" }
tree-sitter-verilog = { path = "./crates/tree-sitter-verilog/", version = "0.0.1" }
sourcegen = { path = "./crates/sourcegen/", version = "0.0.0" }
syntax = { path = "./crates/syntax/", version = "0.0.0" }
anyhow = { package = "anyhow" }
nohash-hasher = { package = "nohash-hasher" }
serde = { package = "serde" }
serde_json = { package = "serde_json" }
crossbeam-channel = { package = "crossbeam-channel" }
notify = { package = "notify" }
tracing = { package = "tracing" }
triomphe = { package = "triomphe" }
la-arena = { package = "la-arena" }
smol_str = { package = "smol_str" }
rustc-hash = { package = "rustc-hash" }
const_format = { package = "const_format" }
itertools = { package = "itertools" }
toml = { package = "toml" }
regex = { package = "regex" }
once_cell = { package = "once_cell" }
salsa = { package = "salsa" }

[toolchain]
channel = "nightly"
