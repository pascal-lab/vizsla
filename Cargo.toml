[package]
name = "vizsla"
version = "0.1.0"
edition = "2021"
authors = ["roifewu <roifewu@gmail.com>"]
repository = "https://github.com/roife/vizsla"
keywords = ["lsp", "language-server", "ide", "verilog", "system-verilog"]
categories = ["development-tools"]
license = "MIT"
readme = "README.md"
description = "Language server for Verilog and System-Verilog"

[workspace]
members = [".", "crates/*"]

[workspace.package]
edition = "2021"

[dependencies]

[workspace.dependencies]
paths = { path = "./crates/paths", version = "0.0.0" }

nohash-hasher = "0.2.0"
